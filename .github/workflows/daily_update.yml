name: 每日自動更新股市資料

on:
  schedule:
    # UTC 00:30 等於台灣時間早上 08:30，週一到週五執行
    - cron: '30 0 * * 1-5'
  workflow_dispatch: # 允許您隨時手動點擊按鈕執行

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 取得最新的程式碼
        uses: actions/checkout@v3

      - name: 準備 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝需要的工具套件
        run: pip install yfinance google-genai

      - name: 執行資料抓取與 Gemini 分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_data.py

      - name: 將最新產生的 data.json 存回 GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add data.json
          git commit -m "自動更新每日股市資料" || exit 0
          git push
