<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股投資分析小管家</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Babel 讓瀏覽器能直接讀懂 React -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          LineChart, Clock, Activity, Target, Zap, DollarSign, 
          BookOpen, Globe, Award, Search, AlertCircle,
          History, ListPlus, Plus, Trash2, CheckCircle, XCircle, Info, TrendingUp, TrendingDown, Calendar
        } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

        // --- 自動計算最近的交易日 (避開六、日) ---
        const getRecentTradingDays = (count, startDate = new Date()) => {
          const days = [];
          let current = new Date(startDate);
          while (days.length < count) {
            const dayOfWeek = current.getDay();
            if (dayOfWeek !== 0 && dayOfWeek !== 6) { 
              const yyyy = current.getFullYear();
              const mm = String(current.getMonth() + 1).padStart(2, '0');
              const dd = String(current.getDate()).padStart(2, '0');
              days.push(`${yyyy}/${mm}/${dd}`);
            }
            current.setDate(current.getDate() - 1);
          }
          return days;
        };

        const mockDates = getRecentTradingDays(5); 

        const mockDatabase = {
          [mockDates[0]]: {
            morningReport: {
              date: mockDates[0],
              usMarket: { dow: "+0.8%", sp500: "+1.2%", nasdaq: "+1.5%", events: "美國央行安撫市場，帶動科技股大漲。" },
              sentiment: { status: "偏多 (氣氛樂觀)", reasons: ["昨晚美國科技股表現很好", "恐慌指數下降"] },
              twFlow: { conclusion: "外資與投信主要佈局伺服器相關公司。", foreign: "買超 120 億", trust: "買超 35 億" },
              focusStocks: [
                { name: "廣達 (2382)", price: "260.5", reason: "代工 AI 伺服器，機構看好", trend: "up" },
                { name: "奇鋐 (3017)", price: "615.0", reason: "散熱需求增溫", trend: "up" }
              ]
            },
            intraday: [
              { time: "09:05 - 09:10", title: "開盤判讀：真實的強勢", desc: "大盤開高走高，上漲家數擴大，表現健康。" },
              { time: "09:30", title: "盤勢確認：適合找買點 (偏多)", desc: "多頭確認，買盤外溢至散熱族群。" }
            ],
            gurus: {
              buffett: {
                name: "華倫・巴菲特 (長抱安心型)", desc: "尋找護城河深、獲利穩定的公司。",
                stocks: [ { name: "崇越 (5434)", price: "245.5", score: 92, reason: "ROE高，半導體材料龍頭。" } ]
              }
            },
            darkHorses: [
              { name: "華城 (1519)", price: "850.0", reason: "台電強韌電網計畫受益", sector: "重電", aiSpillover: "否", sustain: "訂單能見度高" }
            ]
          }
        };

        function InvestmentAssistantApp() {
          const [activeTab, setActiveTab] = useState('morning');
          const [activeGuru, setActiveGuru] = useState('buffett');
          const [selectedDate, setSelectedDate] = useState(mockDates[0]);
          const currentData = mockDatabase[selectedDate] || mockDatabase[mockDates[0]];

          const [realAiData, setRealAiData] = useState(null);

          // 自選股加入瀏覽器記憶功能
          const [customStocks, setCustomStocks] = useState(() => {
            const savedStocks = localStorage.getItem('myCustomStocks');
            if (savedStocks) {
              return JSON.parse(savedStocks);
            }
            return [
              { id: 1, name: "2330 台積電", price: "尚未連線", analysis: "系統已納入追蹤，靜態版僅提供記錄功能。" }
            ];
          });
          const [newStockInput, setNewStockInput] = useState('');
          const [showSuggestions, setShowSuggestions] = useState(false);

          useEffect(() => {
            localStorage.setItem('myCustomStocks', JSON.stringify(customStocks));
          }, [customStocks]);

          useEffect(() => {
            const timestamp = new Date().getTime();
            fetch(`https://raw.githubusercontent.com/qaz7759112-cell/stock-assistant/main/data.json?t=${timestamp}`)
              .then(res => res.json())
              .then(data => setRealAiData(data))
              .catch(err => console.error('無法取得真實資料:', err));
          }, []);

          // 台灣熱門股票小字典
          const commonStocks = [
            { code: "2330", name: "台積電" }, { code: "2317", name: "鴻海" }, { code: "2454", name: "聯發科" },
            { code: "2382", name: "廣達" }, { code: "2308", name: "台達電" }, { code: "2881", name: "富邦金" },
            { code: "2882", name: "國泰金" }, { code: "2412", name: "中華電" }, { code: "2886", name: "兆豐金" },
            { code: "3231", name: "緯創" }, { code: "3017", name: "奇鋐" }, { code: "3324", name: "雙鴻" }
          ];

          const handleAddStock = (e) => {
            e.preventDefault();
            if (!newStockInput.trim()) return;
            const newStock = {
              id: Date.now(),
              name: newStockInput,
              price: "待更新 (靜態版限制)",
              analysis: `【系統紀錄】已將 ${newStockInput} 加入您的個人追蹤清單。此資料會保存在您的瀏覽器中。`
            };
            setCustomStocks([...customStocks, newStock]);
            setNewStockInput('');
          };

          // --- 已修復：刪除自選股功能 ---
          const handleDeleteStock = (id) => {
            setCustomStocks(customStocks.filter(s => s.id !== id));
          };

          const UpText = ({ children }) => <span className="text-red-500 font-bold">{children}</span>;
          const DownText = ({ children }) => <span className="text-green-500 font-bold">{children}</span>;

          const renderDiffTag = (diff, isIndex = false) => {
            if (!diff && diff !== 0) return null;
            const numDiff = parseFloat(diff);
            const px = isIndex ? 'px-3 py-1 text-sm' : 'px-2 py-0.5 text-xs';
            if (numDiff > 0) return <span className={`font-bold text-red-300 bg-red-500/20 rounded ${px}`}>▲ +{numDiff}</span>;
            if (numDiff < 0) return <span className={`font-bold text-green-300 bg-green-500/20 rounded ${px}`}>▼ ${Math.abs(numDiff)}</span>;
            return <span className={`font-bold text-gray-300 bg-gray-500/20 rounded ${px}`}>- 0</span>;
          };

          // 處理歷史資料讀取
          let currentRadarData = null;
          if (realAiData) {
            if (realAiData[selectedDate]) {
              currentRadarData = realAiData[selectedDate];
            } else if (realAiData.date && realAiData.date.replace(/-/g, '/') === selectedDate) {
              currentRadarData = realAiData;
            }
          }

          const isRadarData = !!currentRadarData;
          const displayData = {
            twii: isRadarData && currentRadarData.twii ? currentRadarData.twii : { price: "--", diff: 0 },
            nikkei: isRadarData && currentRadarData.nikkei ? currentRadarData.nikkei : { price: "--", diff: 0 },
            kospi: isRadarData && currentRadarData.kospi ? currentRadarData.kospi : { price: "--", diff: 0 },
            vix: isRadarData && currentRadarData.vix ? currentRadarData.vix : { price: "--", diff: 0 },
            usd_twd: isRadarData && currentRadarData.usd_twd ? currentRadarData.usd_twd : { price: "--", diff: 0 },
            gold: isRadarData && currentRadarData.gold ? currentRadarData.gold : { price: "--", diff: 0 },
            oil: isRadarData && currentRadarData.oil ? currentRadarData.oil : { price: "--", diff: 0 },
            ai: isRadarData && currentRadarData.ai_analysis ? currentRadarData.ai_analysis : {
              status_light: "⚪ 歷史存檔或連線中",
              status_desc: "系統正在準備資料...",
              warning_event: "請確認機器人已於今日早上 08:30 成功執行。"
            },
            date: isRadarData && currentRadarData.date ? currentRadarData.date : selectedDate
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans">
              <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-20">
                <div className="max-w-6xl mx-auto flex items-center justify-between">
                  <div className="flex items-center space-x-2">
                    <LineChart className="text-blue-400 w-8 h-8" />
                    <h1 className="text-xl font-bold tracking-wider">台股投資分析小管家</h1>
                  </div>
                </div>
              </header>

              <div className="bg-white border-b border-gray-200 sticky top-[68px] z-10 shadow-sm">
                <div className="max-w-6xl mx-auto p-3 flex items-center space-x-4 overflow-x-auto">
                  <div className="flex items-center text-gray-600 font-bold mr-2 whitespace-nowrap">
                    <Calendar className="w-5 h-5 mr-2 text-blue-600" /> 選擇交易日：
                  </div>
                  <div className="flex space-x-2">
                    {mockDates.map((date) => (
                      <button
                        key={date}
                        onClick={() => setSelectedDate(date)}
                        className={`px-4 py-1.5 rounded-full text-sm font-bold transition-colors whitespace-nowrap ${
                          selectedDate === date 
                            ? 'bg-blue-600 text-white shadow-md' 
                            : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        }`}
                      >
                        {date}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              <main className="max-w-6xl mx-auto p-4 flex flex-col md:flex-row gap-6 mt-2">
                <aside className="w-full md:w-64 shrink-0">
                  <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden sticky top-[140px]">
                    <nav className="flex flex-col">
                      <button onClick={() => setActiveTab('morning')} className={`flex items-center p-4 transition-colors ${activeTab === 'morning' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <BookOpen className="w-5 h-5 mr-3" /> 1. 每日開盤前報導
                      </button>
                      <button onClick={() => setActiveTab('custom')} className={`flex items-center p-4 transition-colors ${activeTab === 'custom' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <ListPlus className="w-5 h-5 mr-3" /> 2. 我的自選股分析
                      </button>
                      <button onClick={() => setActiveTab('intraday')} className={`flex items-center p-4 transition-colors ${activeTab === 'intraday' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <Clock className="w-5 h-5 mr-3" /> 3. 盤中教學
                      </button>
                    </nav>
                  </div>
                </aside>

                <section className="flex-1 min-w-0">
                  {activeTab === 'morning' && (
                    <div className="space-y-6 animate-fadeIn">
                      <div className="bg-gradient-to-br from-blue-600 to-indigo-800 rounded-xl p-6 text-white shadow-lg border-blue-500 animate-fadeIn">
                        <div className="flex items-center justify-between mb-5 border-b border-white/20 pb-4">
                          <h3 className="text-xl font-bold flex items-center">
                            <Globe className="mr-2 w-6 h-6 text-blue-300" /> {displayData.date} 早盤大環境雷達
                          </h3>
                        </div>

                        {/* 台股大盤指數區塊 */}
                        <div className="bg-white/10 border border-white/20 p-6 rounded-xl backdrop-blur-md mb-5 text-center shadow-inner relative overflow-hidden">
                          <div className="text-blue-200 text-sm font-bold tracking-wider mb-2">🇹🇼 台灣加權指數 (大盤)</div>
                          <div className="flex justify-center items-baseline gap-4">
                            <span className="text-5xl font-extrabold text-white tracking-tight">{displayData.twii.price}</span>
                            {renderDiffTag(displayData.twii.diff, true)}
                          </div>
                        </div>

                        {/* 亞股早盤風向球 */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
                          <div className="bg-white/10 p-4 rounded-lg backdrop-blur-sm border border-white/5">
                            <div className="text-blue-200 text-xs font-bold mb-1 tracking-wider">🇯🇵 日經225 (早盤)</div>
                            <div className="flex items-baseline gap-2">
                              <span className="text-2xl font-bold text-white">{displayData.nikkei.price}</span>
                              {renderDiffTag(displayData.nikkei.diff)}
                            </div>
                          </div>
                          <div className="bg-white/10 p-4 rounded-lg backdrop-blur-sm border border-white/5">
                            <div className="text-blue-200 text-xs font-bold mb-1 tracking-wider">🇰🇷 韓國KOSPI (早盤)</div>
                            <div className="flex items-baseline gap-2">
                              <span className="text-2xl font-bold text-white">{displayData.kospi.price}</span>
                              {renderDiffTag(displayData.kospi.diff)}
                            </div>
                          </div>
                        </div>

                        {/* AI 風險判斷 */}
                        <div className="flex flex-col md:flex-row gap-4 mb-5">
                          <div className="flex-1 bg-white/10 p-5 rounded-lg backdrop-blur-sm border border-white/10">
                            <div className="text-blue-200 text-sm font-bold tracking-wider mb-2">綜合風險狀態</div>
                            <div className="flex items-center gap-3">
                              <span className="text-2xl font-extrabold text-yellow-400">{displayData.ai.status_light}</span>
                            </div>
                            <p className="text-sm mt-3 text-blue-100 font-medium">{displayData.ai.status_desc}</p>
                          </div>
                          <div className="flex-1 bg-white/10 p-5 rounded-lg backdrop-blur-sm border border-white/10">
                            <div className="text-blue-200 text-sm font-bold tracking-wider mb-2">恐慌指數 (VIX)</div>
                            <div className="flex items-baseline gap-3">
                              <span className="text-3xl font-extrabold text-white">{displayData.vix.price}</span>
                              {renderDiffTag(displayData.vix.diff)}
                            </div>
                          </div>
                        </div>

                        {/* 重大預警 */}
                        <div className="bg-red-500/20 border border-red-500/50 p-5 rounded-lg backdrop-blur-md mb-5">
                          <p className="text-sm text-red-300 font-bold mb-2 flex items-center">
                            <AlertCircle className="w-5 h-5 mr-2 text-red-400" /> 開盤前重大事件與操作建議
                          </p>
                          <p className="text-base leading-relaxed text-red-50">{displayData.ai.warning_event}</p>
                        </div>

                        {/* 資金避險指標 */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                          <div className="bg-white/10 p-4 rounded-lg">
                            <div className="text-blue-200 text-xs font-bold mb-1">美元 / 台幣</div>
                            <div className="flex items-baseline gap-2">
                              <span className="text-2xl font-bold text-white">{displayData.usd_twd.price}</span>
                              {renderDiffTag(displayData.usd_twd.diff)}
                            </div>
                          </div>
                          <div className="bg-white/10 p-4 rounded-lg">
                            <div className="text-blue-200 text-xs font-bold mb-1">黃金期貨</div>
                            <div className="flex items-baseline gap-2">
                              <span className="text-2xl font-bold text-yellow-400">{displayData.gold.price}</span>
                              {renderDiffTag(displayData.gold.diff)}
                            </div>
                          </div>
                          <div className="bg-white/10 p-4 rounded-lg">
                            <div className="text-blue-200 text-xs font-bold mb-1">布蘭特原油</div>
                            <div className="flex items-baseline gap-2">
                              <span className="text-2xl font-bold text-orange-400">{displayData.oil.price}</span>
                              {renderDiffTag(displayData.oil.diff)}
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {activeTab === 'custom' && (
                    <div className="space-y-6 animate-fadeIn">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                        <ListPlus className="mr-2 text-blue-600" /> 自選股筆記本
                      </h2>
                      <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="text-sm font-bold text-gray-600 mb-3">請輸入您想追蹤的股票：</h3>
                        <form onSubmit={handleAddStock} className="flex gap-2 relative">
                          <div className="relative flex-1">
                            <input 
                              type="text" 
                              value={newStockInput}
                              onChange={(e) => {
                                setNewStockInput(e.target.value);
                                setShowSuggestions(true);
                              }}
                              onFocus={() => setShowSuggestions(true)}
                              onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
                              placeholder="輸入代號 (例如: 2382 廣達)" 
                              className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none"
                            />
                            {showSuggestions && newStockInput && (
                              <ul className="absolute z-10 w-full bg-white border border-gray-200 mt-1 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                                {commonStocks
                                  .filter(s => s.code.includes(newStockInput) || s.name.includes(newStockInput))
                                  .map(s => (
                                    <li key={s.code} className="p-3 hover:bg-blue-50 cursor-pointer border-b flex items-center"
                                      onMouseDown={(e) => { 
                                        e.preventDefault(); // 防止 onBlur 先觸發
                                        setNewStockInput(`${s.code} ${s.name}`); 
                                        setShowSuggestions(false); 
                                      }}>
                                      <span className="font-bold text-blue-600 w-12">{s.code}</span>
                                      <span className="text-gray-700">{s.name}</span>
                                    </li>
                                  ))}
                              </ul>
                            )}
                          </div>
                          <button type="submit" className="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold">加入清單</button>
                        </form>
                      </div>
                      <div className="grid grid-cols-1 gap-4">
                        {customStocks.map(stock => (
                          <div key={stock.id} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 group hover:border-blue-300 transition-colors">
                            <div className="flex justify-between items-start mb-3">
                              <h3 className="text-xl font-bold text-gray-800">{stock.name}</h3>
                              <button onClick={() => handleDeleteStock(stock.id)} className="text-gray-400 hover:text-red-500 p-1 bg-gray-50 rounded">
                                <Trash2 className="w-5 h-5" />
                              </button>
                            </div>
                            <div className="bg-blue-50/50 p-4 rounded-lg text-sm text-gray-700 border border-blue-50">
                              {stock.analysis}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {activeTab === 'intraday' && (
                    <div className="space-y-6 animate-fadeIn">
                      <div>
                        <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                          <Activity className="mr-2 text-blue-600" /> 盤中教學展示
                        </h2>
                        <p className="text-sm text-gray-500 mt-1 font-bold">此為靜態教學樣板，供您參考開盤判斷邏輯</p>
                      </div>
                      <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 relative">
                        <div className="absolute left-10 top-10 bottom-10 w-0.5 bg-gray-200"></div>
                        {mockDatabase[mockDates[0]].intraday.map((point, idx) => (
                          <div key={idx} className="relative pl-12 mb-8 last:mb-0">
                            <div className="absolute left-[-5px] top-1 w-3 h-3 bg-blue-500 rounded-full border-4 border-white shadow"></div>
                            <div className="flex items-center mb-1">
                              <Clock className="w-4 h-4 text-gray-400 mr-2" />
                              <span className="font-mono text-sm font-bold text-blue-600">{point.time}</span>
                              <span className="mx-2 text-gray-300">|</span>
                              <span className="font-bold text-gray-800">{point.title}</span>
                            </div>
                            <div className="bg-gray-50 p-4 rounded-lg mt-2 text-gray-700 leading-relaxed text-sm border border-gray-100">
                              {point.desc}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </section>
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<InvestmentAssistantApp />);
    </script>
</body>
</html>
