<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股投資分析小管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          LineChart, Clock, Activity, Target, Zap, DollarSign, 
          BookOpen, Globe, Award, Search, AlertCircle,
          History, ListPlus, CheckCircle, XCircle, Info, TrendingUp, TrendingDown, Calendar, ArrowRight, Settings, Key, Loader2, Play, RefreshCw, Trash2, Plus
        } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

        // 產生預設日期
        const getRecentTradingDays = (count, startDate = new Date()) => {
          const days = [];
          let current = new Date(startDate);
          while (days.length < count) {
            const dayOfWeek = current.getDay();
            if (dayOfWeek !== 0 && dayOfWeek !== 6) { 
              const yyyy = current.getFullYear();
              const mm = String(current.getMonth() + 1).padStart(2, '0');
              const dd = String(current.getDate()).padStart(2, '0');
              days.push(`${yyyy}/${mm}/${dd}`); 
            }
            current.setDate(current.getDate() - 1);
          }
          return days;
        };

        function InvestmentAssistantApp() {
          // --- 左側選單排序：預設進入第一分頁 ---
          const [activeTab, setActiveTab] = useState('intl'); 
          const [activeGuru, setActiveGuru] = useState('buffett');
          
          const fallbackDates = getRecentTradingDays(5);
          const [availableDates, setAvailableDates] = useState(fallbackDates);
          const [selectedDate, setSelectedDate] = useState(fallbackDates[0]);
          const [realAiData, setRealAiData] = useState(null);

          // 固定的股神投資心法
          const guruProfiles = {
            buffett: { id: 'buffett', name: "華倫・巴菲特", title: "長抱安心型", desc: "尋找護城河深、每年穩穩賺錢、別人很難搶走生意的公司。適合不想天天看盤、想安心抱著領配息的人。" },
            lynch: { id: 'lynch', name: "彼得・林區", title: "抓爆發成長型", desc: "從生活周遭找正在「爆發性成長」的公司。重點是『它未來能賺更多嗎？』適合喜歡買在起飛點的人。" },
            graham: { id: 'graham', name: "班傑明・葛拉漢", title: "撿便宜安全牌", desc: "專挑價格委屈、被大家忽略的好公司。就像在特賣會撿便宜，重點是『買得夠便宜，就算大跌也不怕』。" }
          };

          // 抓取 GitHub 真實資料
          useEffect(() => {
            const timestamp = new Date().getTime();
            fetch(`https://raw.githubusercontent.com/qaz7759112-cell/stock-assistant/main/data.json?t=${timestamp}`)
              .then(res => res.json())
              .then(data => {
                setRealAiData(data);
                if (data) {
                  const dates = Object.keys(data).filter(k => k.includes('/')).sort((a,b) => new Date(b) - new Date(a));
                  if (dates.length > 0) {
                    setAvailableDates(dates);
                    setSelectedDate(dates[0]); 
                  }
                }
              })
              .catch(err => console.error('無法取得真實資料:', err));
          }, []);

          // ==========================================
          // 🔥 自選股功能：完全在網頁端操作與記憶
          // ==========================================
          const [apiKey, setApiKey] = useState(() => localStorage.getItem('geminiApiKey_stock_assistant') || '');
          const [apiKeyError, setApiKeyError] = useState('');
          const [loadingStockId, setLoadingStockId] = useState(null);
          const [isEditingKey, setIsEditingKey] = useState(() => !localStorage.getItem('geminiApiKey_stock_assistant'));

          const [customStocks, setCustomStocks] = useState(() => {
            const saved = localStorage.getItem('myCustomStocks_v5');
            if (saved) return JSON.parse(saved);
            return []; 
          });
          const [newStockInput, setNewStockInput] = useState('');
          const [showSuggestions, setShowSuggestions] = useState(false);

          useEffect(() => localStorage.setItem('geminiApiKey_stock_assistant', apiKey), [apiKey]);
          useEffect(() => localStorage.setItem('myCustomStocks_v5', JSON.stringify(customStocks)), [customStocks]);

          const commonStocks = [
            { code: "2330", name: "台積電" }, { code: "2317", name: "鴻海" }, { code: "2454", name: "聯發科" },
            { code: "2382", name: "廣達" }, { code: "2308", name: "台達電" }, { code: "1519", name: "華城" }
          ];

          // 新增自選股 (完全不需去後台)
          const handleAddStock = (e) => {
            e.preventDefault();
            if (!newStockInput.trim()) return;
            const newStock = {
              id: Date.now(),
              name: newStockInput,
              addedAt: new Date().toISOString(), 
              aiResult: null 
            };
            setCustomStocks([newStock, ...customStocks]);
            setNewStockInput('');
          };

          const handleDeleteStock = (id) => {
            setCustomStocks(customStocks.filter(s => s.id !== id));
          };

          // 呼叫 Gemini AI 進行即時分析
          const handleAnalyzeStock = async (stock) => {
            if (!apiKey) {
              setApiKeyError('⚠️ 請先輸入上方的 API Key 才能啟用即時預測');
              setIsEditingKey(true);
              return;
            }
            setApiKeyError('');
            setLoadingStockId(stock.id);

            try {
              const prompt = `現在是台灣時間。請作為專業台股分析師，針對股票「${stock.name}」進行今日走勢判斷。
請嚴格以 JSON 格式回傳 (不要加 markdown 標記)：
{"trend": "看漲" 或 "看跌" 或 "盤整", "reason": "50字內判斷原因(資金面或消息面)"}`;
              
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
              });

              const data = await response.json();
              if (data.error) throw new Error(data.error.message);
              
              let text = data.candidates[0].content.parts[0].text;
              text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
              const result = JSON.parse(text);

              setCustomStocks(prev => prev.map(s => s.id === stock.id ? { ...s, aiResult: result } : s));
            } catch (err) {
              alert("分析失敗，請檢查 API Key 是否正確。詳細錯誤：" + err.message);
            } finally {
              setLoadingStockId(null);
            }
          };

          // ==========================================

          const UpText = ({ children }) => <span className="text-red-500 font-bold">{children}</span>;
          const DownText = ({ children }) => <span className="text-green-500 font-bold">{children}</span>;
          const renderDiffTag = (diff, isIndex = false) => {
            if (!diff && diff !== 0) return null;
            const numDiff = parseFloat(diff);
            const px = isIndex ? 'px-3 py-1 text-sm' : 'px-2 py-0.5 text-xs';
            if (numDiff > 0) return <span className={`font-bold text-red-300 bg-red-500/20 rounded ${px}`}>▲ +{numDiff}</span>;
            if (numDiff < 0) return <span className={`font-bold text-green-300 bg-green-500/20 rounded ${px}`}>▼ ${Math.abs(numDiff)}</span>;
            return <span className={`font-bold text-gray-300 bg-gray-500/20 rounded ${px}`}>- 0</span>;
          };

          let currentRadarData = null;
          if (realAiData && realAiData[selectedDate]) {
            currentRadarData = realAiData[selectedDate];
          }

          const isRadarData = !!currentRadarData;
          const displayDate = isRadarData && currentRadarData.date ? currentRadarData.date.replace(/-/g, '/') : selectedDate;

          const displayData = {
            twii: isRadarData && currentRadarData.twii ? currentRadarData.twii : { price: "--", diff: 0 },
            nikkei: isRadarData && currentRadarData.nikkei ? currentRadarData.nikkei : { price: "--", diff: 0 },
            kospi: isRadarData && currentRadarData.kospi ? currentRadarData.kospi : { price: "--", diff: 0 },
            vix: isRadarData && currentRadarData.vix ? currentRadarData.vix : { price: "--", diff: 0 },
            usd_twd: isRadarData && currentRadarData.usd_twd ? currentRadarData.usd_twd : { price: "--", diff: 0 },
            gold: isRadarData && currentRadarData.gold ? currentRadarData.gold : { price: "--", diff: 0 },
            oil: isRadarData && currentRadarData.oil ? currentRadarData.oil : { price: "--", diff: 0 },
            usMarket: isRadarData && currentRadarData.usMarket ? currentRadarData.usMarket : null,
            twFlow: isRadarData && currentRadarData.twFlow ? currentRadarData.twFlow : null,
            ai: isRadarData && currentRadarData.ai_analysis ? currentRadarData.ai_analysis : {
              status_light: "⚪ 系統等待更新", status_desc: "本日資料尚未產生，請確認 GitHub 機器人是否已在 08:30 執行。", warning_event: "請手動觸發機器人，或等待明日更新。"
            },
            dark_horses: isRadarData && currentRadarData.dark_horses ? currentRadarData.dark_horses : [],
            intraday_guide: isRadarData && currentRadarData.intraday_guide ? currentRadarData.intraday_guide : [],
            gurus: isRadarData && currentRadarData.gurus && Object.keys(currentRadarData.gurus).length > 0 ? currentRadarData.gurus : {},
            prediction_review: isRadarData && currentRadarData.prediction_review && currentRadarData.prediction_review.date ? currentRadarData.prediction_review : null,
            date: displayDate
          };

          const formatMarketValue = (valStr) => {
            if (!valStr) return "--";
            if (valStr.includes('+')) return <UpText>{valStr}</UpText>;
            if (valStr.includes('-')) return <DownText>{valStr}</DownText>;
            return valStr;
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans pb-10">
              <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-20">
                <div className="max-w-6xl mx-auto flex items-center justify-between">
                  <div className="flex items-center space-x-2">
                    <LineChart className="text-blue-400 w-8 h-8" />
                    <h1 className="text-xl font-bold tracking-wider">台股投資分析小管家</h1>
                  </div>
                </div>
              </header>

              <div className="bg-white border-b border-gray-200 sticky top-[68px] z-10 shadow-sm">
                <div className="max-w-6xl mx-auto p-3 flex items-center space-x-4 overflow-x-auto">
                  <div className="flex items-center text-gray-600 font-bold mr-2 whitespace-nowrap">
                    <Calendar className="w-5 h-5 mr-2 text-blue-600" /> 日記存檔：
                  </div>
                  <div className="flex space-x-2">
                    {availableDates.map((date) => (
                      <button key={date} onClick={() => setSelectedDate(date)}
                        className={`px-4 py-1.5 rounded-full text-sm font-bold transition-colors whitespace-nowrap ${
                          selectedDate === date ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        }`}>
                        {date}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              <main className="max-w-6xl mx-auto p-4 flex flex-col md:flex-row gap-6 mt-2">
                
                {/* 重新排序的 7 大選單 */}
                <aside className="w-full md:w-64 shrink-0">
                  <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden sticky top-[140px]">
                    <nav className="flex flex-col">
                      <button onClick={() => setActiveTab('intl')} className={`flex items-center p-4 transition-colors ${activeTab === 'intl' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <Globe className="w-5 h-5 mr-3" /> 1. 國際情勢
                      </button>
                      <button onClick={() => setActiveTab('morning')} className={`flex items-center p-4 transition-colors ${activeTab === 'morning' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <BookOpen className="w-5 h-5 mr-3" /> 2. 每日開盤前報導
                      </button>
                      <button onClick={() => setActiveTab('custom')} className={`flex items-center p-4 transition-colors ${activeTab === 'custom' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <ListPlus className="w-5 h-5 mr-3" /> 3. 我的自選股分析
                      </button>
                      <button onClick={() => setActiveTab('gurus')} className={`flex items-center p-4 transition-colors ${activeTab === 'gurus' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <Award className="w-5 h-5 mr-3" /> 4. 股神幫你挑好股
                      </button>
                      <button onClick={() => setActiveTab('darkhorse')} className={`flex items-center p-4 transition-colors ${activeTab === 'darkhorse' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <Zap className="w-5 h-5 mr-3" /> 5. 今日五檔大黑馬
                      </button>
                      <button onClick={() => setActiveTab('intraday')} className={`flex items-center p-4 transition-colors ${activeTab === 'intraday' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <Activity className="w-5 h-5 mr-3" /> 6. 盤中即時監測
                      </button>
                      <button onClick={() => setActiveTab('prediction')} className={`flex items-center p-4 transition-colors ${activeTab === 'prediction' ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-600 font-bold' : 'text-gray-600 hover:bg-gray-50'}`}>
                        <History className="w-5 h-5 mr-3" /> 7. 檢討昨日預測
                      </button>
                    </nav>
                  </div>
                </aside>

                <section className="flex-1 min-w-0">

                  {/* 分頁 1：國際情勢 */}
                  {activeTab === 'intl' && (
                    <div className="space-y-6 animate-fadeIn">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                        <Globe className="mr-2 text-blue-600" /> 國際情勢與大環境
                      </h2>
                      
                      <div className="bg-gradient-to-br from-indigo-800 to-slate-800 rounded-xl p-6 text-white shadow-lg border border-indigo-500">
                        <div className="mb-6">
                          <h3 className="text-lg font-bold mb-3 flex items-center text-indigo-200">🇺🇸 昨晚美國股市表現</h3>
                          {displayData.usMarket ? (
                            <>
                              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                <div className="bg-white/10 p-4 rounded-lg border border-white/10 text-center">
                                  <div className="text-sm text-indigo-200 mb-1">道瓊工業</div>
                                  <div className="text-2xl font-bold">{formatMarketValue(displayData.usMarket.dow)}</div>
                                </div>
                                <div className="bg-white/10 p-4 rounded-lg border border-white/10 text-center">
                                  <div className="text-sm text-indigo-200 mb-1">標普500</div>
                                  <div className="text-2xl font-bold">{formatMarketValue(displayData.usMarket.sp500)}</div>
                                </div>
                                <div className="bg-white/10 p-4 rounded-lg border border-white/10 text-center">
                                  <div className="text-sm text-indigo-200 mb-1">那斯達克</div>
                                  <div className="text-2xl font-bold">{formatMarketValue(displayData.usMarket.nasdaq)}</div>
                                </div>
                              </div>
                              <div className="bg-indigo-900/50 p-4 rounded-lg text-sm text-indigo-100 flex items-start border border-indigo-700 leading-relaxed">
                                <Info className="w-5 h-5 mr-2 mt-0.5 shrink-0 text-indigo-300" />
                                {displayData.usMarket.events}
                              </div>
                            </>
                          ) : (
                            <div className="text-indigo-300 p-6 border border-dashed border-indigo-500/50 rounded-lg text-center">
                              等待 AI 機器人每日 08:30 讀取最新美股資料...
                            </div>
                          )}
                        </div>

                        <h3 className="text-lg font-bold mb-3 flex items-center text-indigo-200 border-t border-white/20 pt-6">🌏 亞洲早盤與避險資金指標</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                          <div className="bg-white/10 p-4 rounded-lg flex justify-between items-center border border-white/5">
                            <div className="text-indigo-200 text-sm font-bold">🇯🇵 日經225</div>
                            <div className="flex items-baseline gap-2"><span className="text-xl font-bold">{displayData.nikkei.price}</span>{renderDiffTag(displayData.nikkei.diff)}</div>
                          </div>
                          <div className="bg-white/10 p-4 rounded-lg flex justify-between items-center border border-white/5">
                            <div className="text-indigo-200 text-sm font-bold">🇰🇷 韓國KOSPI</div>
                            <div className="flex items-baseline gap-2"><span className="text-xl font-bold">{displayData.kospi.price}</span>{renderDiffTag(displayData.kospi.diff)}</div>
                          </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                          <div className="bg-white/10 p-4 rounded-lg text-center border border-white/5">
                            <div className="text-indigo-200 text-xs font-bold mb-1">恐慌指數(VIX)</div>
                            <div className="text-lg font-bold">{displayData.vix.price}</div>{renderDiffTag(displayData.vix.diff)}
                          </div>
                          <div className="bg-white/10 p-4 rounded-lg text-center border border-white/5">
                            <div className="text-indigo-200 text-xs font-bold mb-1">美元/台幣</div>
                            <div className="text-lg font-bold">{displayData.usd_twd.price}</div>{renderDiffTag(displayData.usd_twd.diff)}
                          </div>
                          <div className="bg-white/10 p-4 rounded-lg text-center border border-white/5">
                            <div className="text-indigo-200 text-xs font-bold mb-1">黃金期貨</div>
                            <div className="text-lg font-bold text-yellow-400">{displayData.gold.price}</div>{renderDiffTag(displayData.gold.diff)}
                          </div>
                          <div className="bg-white/10 p-4 rounded-lg text-center border border-white/5">
                            <div className="text-indigo-200 text-xs font-bold mb-1">布蘭特原油</div>
                            <div className="text-lg font-bold text-orange-400">{displayData.oil.price}</div>{renderDiffTag(displayData.oil.diff)}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                  
                  {/* 分頁 2：每日開盤前報導 */}
                  {activeTab === 'morning' && (
                    <div className="space-y-6 animate-fadeIn">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                        <BookOpen className="mr-2 text-blue-600" /> 每日開盤前報導
                      </h2>
                      
                      <div className="bg-gradient-to-br from-blue-600 to-indigo-800 rounded-xl p-6 text-white shadow-lg border border-blue-500 animate-fadeIn">
                        <div className="flex items-center justify-between mb-5 border-b border-white/20 pb-4">
                          <h3 className="text-xl font-bold flex items-center"><Target className="mr-2 w-6 h-6 text-blue-300" /> {displayData.date} 台股開盤雷達</h3>
                        </div>

                        <div className="bg-white/10 border border-white/20 p-6 rounded-xl backdrop-blur-md mb-5 text-center shadow-inner">
                          <div className="text-blue-200 text-sm font-bold tracking-wider mb-2">🇹🇼 台灣加權指數 (大盤)</div>
                          <div className="flex justify-center items-baseline gap-4">
                            <span className="text-5xl font-extrabold text-white tracking-tight">{displayData.twii.price}</span>
                            {renderDiffTag(displayData.twii.diff, true)}
                          </div>
                        </div>

                        <div className="bg-white/10 p-5 rounded-lg border border-white/10 mb-5 text-center">
                          <div className="text-blue-200 text-sm font-bold mb-2">AI 綜合風險狀態判斷</div>
                          <div className="text-2xl font-extrabold text-yellow-400 mb-2">{displayData.ai.status_light}</div>
                          <p className="text-sm text-blue-100">{displayData.ai.status_desc}</p>
                        </div>

                        <div className="bg-red-500/20 border border-red-500/50 p-5 rounded-lg">
                          <p className="text-sm text-red-300 font-bold mb-2 flex items-center"><AlertCircle className="w-5 h-5 mr-2 text-red-400" /> AI 開盤前操作建議</p>
                          <p className="text-base leading-relaxed text-red-50">{displayData.ai.warning_event}</p>
                        </div>
                      </div>

                      <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="text-lg font-bold mb-4 flex items-center text-gray-700">
                          <DollarSign className="mr-2 w-5 h-5 text-green-600" /> 股市大戶把錢往哪砸？
                        </h3>
                        {displayData.twFlow ? (
                          <>
                            <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-200 mb-4">
                              <div className="text-center flex-1 border-r border-gray-200">
                                <div className="text-sm text-gray-500 mb-1 font-bold">外資 (外國機構)</div>
                                <div className={`text-xl font-bold ${displayData.twFlow.foreign.includes('買') ? 'text-red-600' : 'text-green-600'}`}>{displayData.twFlow.foreign}</div>
                              </div>
                              <div className="text-center flex-1">
                                <div className="text-sm text-gray-500 mb-1 font-bold">投信 (國內基金)</div>
                                <div className={`text-xl font-bold ${displayData.twFlow.trust.includes('買') ? 'text-red-600' : 'text-green-600'}`}>{displayData.twFlow.trust}</div>
                              </div>
                            </div>
                            <div className="bg-yellow-50 p-4 rounded-lg border border-yellow-200 text-sm font-medium text-yellow-800 flex items-center leading-relaxed">
                              <span className="text-lg mr-2 shrink-0">🎯</span> {displayData.twFlow.conclusion}
                            </div>
                          </>
                        ) : (
                          <div className="text-gray-500 p-6 text-center border border-dashed border-gray-200 rounded-xl">
                            今日大戶籌碼預測等待 AI 結算更新...
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* 分頁 3：我的自選股分析 (您要求的：網頁直接新增、不需後台) */}
                  {activeTab === 'custom' && (
                    <div className="space-y-6 animate-fadeIn">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                        <ListPlus className="mr-2 text-blue-600" /> 我的自選股分析
                      </h2>
                      
                      {/* API Key 綁定區塊 */}
                      <div className="bg-slate-800 p-5 rounded-xl shadow-md flex flex-col md:flex-row items-center gap-4">
                        <Key className="w-8 h-8 text-yellow-400 shrink-0" />
                        <div className="flex-1 w-full">
                          {isEditingKey ? (
                            <>
                              <div className="text-white font-bold mb-2 flex items-center">
                                綁定您的 Gemini API 鑰匙以啟用即時預測
                                <span className="ml-2 text-xs bg-slate-700 text-slate-300 px-2 py-1 rounded">僅儲存於本機瀏覽器，安全無虞</span>
                              </div>
                              <div className="flex gap-2">
                                <input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); setApiKeyError(''); }} 
                                  placeholder="貼上您的 AIzaSy... 鑰匙" className="w-full bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-400" />
                                <button onClick={() => { if(apiKey) setIsEditingKey(false); else setApiKeyError('請輸入鑰匙'); }} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-bold whitespace-nowrap transition-colors">儲存</button>
                              </div>
                              {apiKeyError && <div className="text-red-400 text-sm mt-2 font-bold">{apiKeyError}</div>}
                            </>
                          ) : (
                            <div className="flex justify-between items-center w-full">
                              <div className="text-green-400 font-bold flex items-center text-lg"><CheckCircle className="w-6 h-6 mr-2" /> API 鑰匙已安全綁定於本機</div>
                              <button onClick={() => setIsEditingKey(true)} className="text-slate-300 hover:text-white text-sm underline font-medium">修改鑰匙</button>
                            </div>
                          )}
                        </div>
                      </div>

                      {/* 輸入框完全回歸，並可直接呼叫 AI */}
                      <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h3 className="text-sm font-bold text-gray-600 mb-3 flex items-center"><Target className="w-4 h-4 mr-1" /> 輸入想關注的股票：</h3>
                        <form onSubmit={handleAddStock} className="flex gap-2 relative">
                          <div className="relative flex-1">
                            <input type="text" value={newStockInput} onChange={(e) => { setNewStockInput(e.target.value); setShowSuggestions(true); }}
                              onFocus={() => setShowSuggestions(true)} placeholder="輸入代號或名稱 (例如: 2382 廣達)" className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-gray-700" />
                            {showSuggestions && newStockInput && (
                              <ul className="absolute z-10 w-full bg-white border mt-1 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                                {commonStocks.filter(s => s.code.includes(newStockInput) || s.name.includes(newStockInput)).map(s => (
                                    <li key={s.code} className="p-3 hover:bg-blue-50 cursor-pointer border-b flex items-center" onMouseDown={(e) => { e.preventDefault(); setNewStockInput(`${s.code} ${s.name}`); setShowSuggestions(false); }}>
                                      <span className="font-bold text-blue-600 w-12">{s.code}</span><span className="text-gray-700 font-medium">{s.name}</span>
                                    </li>
                                  ))}
                              </ul>
                            )}
                          </div>
                          <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold flex items-center shrink-0 transition-colors">
                            <Plus className="w-5 h-5 mr-1" /> 加入清單
                          </button>
                        </form>
                      </div>

                      {/* 自選股清單與即時 AI 判斷按鈕 */}
                      <div className="grid grid-cols-1 gap-5">
                        {customStocks.length === 0 ? (
                          <div className="text-gray-400 text-center py-10 bg-white rounded-xl border border-gray-200 border-dashed">清單空空如也，快在上方加入您關注的股票吧！</div>
                        ) : customStocks.map(stock => {
                          const addedDateStr = new Date(stock.addedAt).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
                          return (
                            <div key={stock.id} className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:border-blue-300 transition-all group">
                              <div className="flex justify-between items-start mb-4">
                                <div>
                                  <h3 className="text-2xl font-extrabold text-gray-800">{stock.name}</h3>
                                  <div className="text-xs text-gray-400 mt-1 flex items-center"><Clock className="w-3 h-3 mr-1" /> 新增時間：{addedDateStr}</div>
                                </div>
                                <button onClick={() => handleDeleteStock(stock.id)} className="text-gray-300 hover:text-red-500 p-2 rounded-lg hover:bg-red-50" title="刪除"><Trash2 className="w-5 h-5" /></button>
                              </div>

                              {stock.aiResult ? (
                                <div className="bg-blue-50/50 p-5 rounded-xl border border-blue-100 relative">
                                  <div className="flex justify-between items-center mb-3">
                                    <div className={`px-4 py-1.5 rounded-full font-bold flex items-center text-sm ${stock.aiResult.trend.includes('漲') ? 'bg-red-100 text-red-700 border border-red-200' : stock.aiResult.trend.includes('跌') ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-yellow-100 text-yellow-700 border border-yellow-200'}`}>
                                      {stock.aiResult.trend.includes('漲') && <TrendingUp className="w-4 h-4 mr-1"/>}
                                      {stock.aiResult.trend.includes('跌') && <TrendingDown className="w-4 h-4 mr-1"/>}
                                      {stock.aiResult.trend.includes('盤整') && <ArrowRight className="w-4 h-4 mr-1"/>} AI 判斷：{stock.aiResult.trend}
                                    </div>
                                    <button onClick={() => handleAnalyzeStock(stock)} disabled={loadingStockId === stock.id} className="text-blue-600 hover:text-blue-800 text-sm font-bold flex items-center bg-white px-3 py-1 rounded shadow-sm border border-blue-200">
                                      {loadingStockId === stock.id ? <Loader2 className="w-4 h-4 mr-1 animate-spin" /> : <RefreshCw className="w-4 h-4 mr-1" />}重新判斷
                                    </button>
                                  </div>
                                  <div className="text-gray-700 leading-relaxed text-sm"><strong className="text-blue-800 flex items-center mb-1"><Search className="w-4 h-4 mr-1"/> 判斷原因：</strong>{stock.aiResult.reason}</div>
                                </div>
                              ) : (
                                <button onClick={() => handleAnalyzeStock(stock)} disabled={loadingStockId === stock.id} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 text-white px-5 py-4 rounded-xl font-bold flex justify-center items-center shadow-md transition-transform hover:scale-[1.01]">
                                  {loadingStockId === stock.id ? <><Loader2 className="w-5 h-5 mr-2 animate-spin" /> AI 即時運算中...</> : <><Play className="w-5 h-5 mr-2 fill-current" /> 立即讓 AI 進行走勢分析</>}
                                </button>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* 分頁 4：股神幫你挑好股 (您要求的：最少 3 支) */}
                  {activeTab === 'gurus' && (
                    <div className="space-y-6 animate-fadeIn">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                        <Award className="mr-2 text-blue-600" /> 股神幫你挑好股
                      </h2>
                      <div className="flex space-x-2 border-b border-gray-200 pb-2 overflow-x-auto">
                        {Object.values(guruProfiles).map(guru => (
                          <button key={guru.id} onClick={() => setActiveGuru(guru.id)}
                            className={`px-4 py-2 rounded-t-lg font-bold transition-colors whitespace-nowrap ${activeGuru === guru.id ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                            {guru.name}
                          </button>
                        ))}
                      </div>
                      <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="text-xl font-bold text-gray-800 mb-2 flex items-center">
                          <Target className="w-5 h-5 mr-2 text-red-500" /> {guruProfiles[activeGuru].name} <span className="text-sm text-gray-500 font-normal ml-2">({guruProfiles[activeGuru].title})</span>
                        </h3>
                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-r text-sm text-gray-700 leading-relaxed">
                          {guruProfiles[activeGuru].desc}
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {displayData.gurus[activeGuru]?.stocks && displayData.gurus[activeGuru].stocks.length > 0 ? (
                            displayData.gurus[activeGuru].stocks.map((stock, idx) => (
                              <div key={idx} className="border border-gray-200 rounded-lg p-5 hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-start mb-3">
                                  <span className="text-lg font-bold text-blue-800">{stock.name} <span className="text-sm text-gray-500 ml-1">@{stock.price}</span></span>
                                  <span className="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded">評分: {stock.score}</span>
                                </div>
                                <p className="text-sm text-gray-600 mt-2 leading-relaxed">{stock.reason}</p>
                              </div>
                            ))
                          ) : (
                            <div className="text-gray-500 p-8 text-center col-span-full border border-dashed border-gray-200 rounded-lg">
                              今日 AI 尚未產出推薦名單，請確認機器人已於早上 8:30 成功執行。
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 分頁 5：今日五檔大黑馬 (您要求的：補滿 5 檔) */}
                  {activeTab === 'darkhorse' && (
                    <div className="space-y-6 animate-fadeIn">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                        <Zap className="mr-2 text-yellow-500" /> 今日五檔大黑馬
                      </h2>
                      <div className="grid grid-cols-1 gap-4">
                        {displayData.dark_horses.length > 0 ? displayData.dark_horses.map((horse, idx) => (
                          <div key={idx} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                            <div className="text-xl font-bold text-gray-800 mb-3 flex items-center">
                              <span className="bg-slate-800 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm mr-2">{idx + 1}</span>
                              {horse.name} <span className="text-sm text-gray-500 ml-2 font-normal">位階: {horse.price}</span>
                              <span className="ml-3 text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full font-bold">{horse.sector}</span>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-gray-100 pt-4">
                              <div><div className="text-xs text-gray-500 font-bold mb-1 flex items-center"><Search className="w-3 h-3 mr-1"/>入選原因</div><div className="text-sm text-gray-700 leading-relaxed">{horse.reason}</div></div>
                              <div><div className="text-xs text-gray-500 font-bold mb-1 flex items-center"><Target className="w-3 h-3 mr-1"/>延續性判斷</div><div className="text-sm text-gray-700 leading-relaxed">{horse.sustain}</div></div>
                            </div>
                          </div>
                        )) : <div className="text-gray-500 p-10 text-center bg-white rounded-xl border border-gray-200 border-dashed">等待 AI 生成 5 檔黑馬清單...</div>}
                      </div>
                    </div>
                  )}

                  {/* 分頁 6：盤中即時監測 */}
                  {activeTab === 'intraday' && (
                    <div className="space-y-6 animate-fadeIn">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                        <Activity className="mr-2 text-blue-600" /> 盤中即時監測
                      </h2>
                      <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 text-sm text-blue-800 mb-4">
                        <Info className="inline-block w-4 h-4 mr-1 mb-1" />
                        系統設定於 <strong>09:30、10:30、12:30</strong> 三個時間點自動喚醒。當時間到達，即可刷新頁面查看 AI 研判之最新趨勢。
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {[
                          { time: '09:30', title: '09:30 早盤確認' },
                          { time: '10:30', title: '10:30 盤中轉折' },
                          { time: '12:30', title: '12:30 尾盤佈局' }
                        ].map((slot) => {
                          const slotHour = slot.time.split(':')[0];
                          const slotData = displayData.intraday_guide.find(item => item.time && item.time.includes(slotHour));
                          return (
                            <div key={slot.time} className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full hover:shadow-md transition-shadow">
                              <div className="flex items-center justify-between mb-4 border-b border-gray-100 pb-3">
                                <span className="text-lg font-extrabold text-blue-800 flex items-center">
                                  <Clock className="w-5 h-5 mr-2 text-blue-500" /> {slot.title}
                                </span>
                              </div>
                              <div className="flex-1 flex flex-col">
                                {slotData ? (
                                  <div className="text-gray-700 text-sm leading-relaxed">
                                    <div className="font-bold text-gray-800 mb-2">{slotData.title}</div>
                                    {slotData.desc}
                                  </div>
                                ) : (
                                  <div className="text-gray-400 text-sm flex flex-col items-center justify-center h-full py-8">
                                    <Activity className="w-10 h-10 text-gray-200 mb-3" />
                                    <span className="font-medium">等待自動更新...</span>
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* 分頁 7：檢討昨日預測 */}
                  {activeTab === 'prediction' && (
                    <div className="space-y-6 animate-fadeIn">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                        <History className="mr-2 text-blue-600" /> 檢討昨日預測
                      </h2>
                      <div className="text-gray-600 font-medium mb-4 bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                        <Info className="inline-block w-4 h-4 mr-1 mb-0.5 text-blue-500"/> 今天是 <strong className="text-blue-700">{displayData.date}</strong>，以下為前一交易日的 AI 預測與台股實際走勢檢討分析：
                      </div>
                      
                      {displayData.prediction_review ? (
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row md:items-stretch gap-6 hover:shadow-md transition-shadow">
                          <div className="md:w-1/4 flex flex-col justify-center items-center p-4 bg-gray-50 rounded-xl border border-gray-100 text-center">
                            <span className="text-sm font-bold text-gray-500 mb-2">檢討日期</span>
                            <span className="text-xl font-extrabold text-gray-800">{displayData.prediction_review.date}</span>
                            <div className={`mt-4 flex items-center justify-center font-bold text-lg px-4 py-2 rounded-full shadow-sm w-full ${displayData.prediction_review.accurate ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-100 text-red-700 border border-red-200'}`}>
                              {displayData.prediction_review.accurate ? <CheckCircle className="w-5 h-5 mr-1" /> : <XCircle className="w-5 h-5 mr-1" />} 
                              {displayData.prediction_review.gap}
                            </div>
                          </div>
                          
                          <div className="md:w-3/4 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="border-l-4 border-blue-400 pl-4 py-1">
                              <div className="text-xs text-blue-600 font-bold mb-2 flex items-center uppercase tracking-wider"><BookOpen className="w-3 h-3 mr-1"/>AI 盤前預測</div>
                              <div className="text-gray-800 font-medium leading-relaxed">{displayData.prediction_review.prediction}</div>
                            </div>
                            <div className="border-l-4 border-gray-400 pl-4 py-1">
                              <div className="text-xs text-gray-600 font-bold mb-2 flex items-center uppercase tracking-wider"><Activity className="w-3 h-3 mr-1"/>台股實際走勢</div>
                              <div className="text-gray-800 font-medium leading-relaxed">{displayData.prediction_review.actual}</div>
                            </div>
                            <div className="col-span-full mt-2 pt-4 border-t border-gray-100">
                              <div className="text-sm text-gray-500 font-bold mb-2 flex items-center"><Search className="w-4 h-4 mr-1 text-gray-400"/> 檢討與反思分析：</div>
                              <div className="text-sm text-gray-700 leading-relaxed bg-gray-50 p-4 rounded-lg">{displayData.prediction_review.detail}</div>
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div className="text-gray-500 p-10 text-center bg-white rounded-xl border border-gray-200 border-dashed">
                          <History className="w-12 h-12 text-gray-300 mx-auto mb-3" />
                          尚無昨日檢討紀錄。
                        </div>
                      )}
                    </div>
                  )}

                </section>
              </main>
              
              <style dangerouslySetInnerHTML={{__html: `
                @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
              `}} />
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<InvestmentAssistantApp />);
    </script>
</body>
</html>
