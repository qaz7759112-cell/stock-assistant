        const getRecentTradingDays = (count, startDate = new Date()) => {

          while (days.length < count) {
            const dayOfWeek = current.getDay();
            // 0是週日，6是週六，只要不是這兩天就納入陣列
            if (dayOfWeek !== 0 && dayOfWeek !== 6) { 
              const yyyy = current.getFullYear();
              const mm = String(current.getMonth() + 1).padStart(2, '0');
              const dd = String(current.getDate()).padStart(2, '0');
              days.push(`${yyyy}/${mm}/${dd}`);
            }
            current.setDate(current.getDate() - 1);
          }
          return days;
        };

                    <div className="space-y-6 animate-fadeIn">
                      <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                        <History className="mr-2 text-blue-600" /> 檢討系統預測準度
                      </h2>
                      <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 text-sm text-blue-800 mb-4 leading-relaxed">
                        這是用來「事後檢討」的區塊。不管是電腦還是人都無法 100% 猜對明天股市會怎樣。這個功能是為了讓您知道「電腦什麼時候會看走眼（例如突然發生戰爭、天災）」，讓您對股市保持警覺。
                      </div>
                      <div className="space-y-4">
                        {mockPredictionGap.map((gap, idx) => (
                          <div key={idx} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row md:items-stretch gap-4 hover:shadow-md transition-shadow">
                            <div className="md:w-1/5 flex flex-col justify-center items-center p-3 bg-gray-50 rounded-lg border border-gray-100">
                              <span className="text-sm font-bold text-gray-500">{gap.date}</span>
                              <div className={`mt-2 flex items-center font-bold ${gap.accurate ? 'text-green-600' : 'text-red-500'}`}>
                                {gap.accurate ? <CheckCircle className="w-5 h-5 mr-1" /> : <XCircle className="w-5 h-5 mr-1" />}
                                {gap.gap}
                              </div>
                            </div>
                            <div className="md:w-2/5 border-l-4 border-blue-300 pl-4 py-2">
                              <div className="text-xs text-gray-500 font-bold mb-1 flex items-center"><Activity className="w-3 h-3 mr-1"/> 早上開盤前電腦的預測</div>
                              <div className="text-gray-800 font-medium">{gap.prediction}</div>
                            </div>
                            <div className="md:w-2/5 border-l-4 border-gray-300 pl-4 py-2">
                              <div className="text-xs text-gray-500 font-bold mb-1 flex items-center"><Target className="w-3 h-3 mr-1"/> 下午收盤時的真實情況</div>
                              <div className="text-gray-800 font-medium">{gap.actual}</div>
                              <div className="text-sm text-gray-500 mt-2 border-t border-gray-100 pt-2">{gap.detail}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </section>
              </main>
              
              <style dangerouslySetInnerHTML={{__html: `
                @keyframes fadeIn {
                  from { opacity: 0; transform: translateY(10px); }
                  to { opacity: 1; transform: translateY(0); }
                }
                .animate-fadeIn {
                  animation: fadeIn 0.3s ease-out forwards;
                }
              `}} />
            </div>
          );
        }

        // 把整個應用程式畫到網頁上
        const root = createRoot(document.getElementById('root'));
        root.render(<InvestmentAssistantApp />);
    </script>
</body>
</html>
